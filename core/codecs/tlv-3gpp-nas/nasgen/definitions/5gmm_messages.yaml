    ies:
      - {name: ConfigurationUpdateIndication, iei: "D-", presence: O, format: TV, length: "1", type_ref: ConfigurationUpdateIndication}
      - {name: GUTI5G, iei: "77", presence: O, format: TLV-E, length: "14", type_ref: MobileIdentity5GS}
      - {name: TAIList, iei: "54", presence: O, format: TLV, length: "9-114", type_ref: ServiceAreaList}
      - {name: AllowedNSSAI, iei: "15", presence: O, format: TLV, length: "4-74", type_ref: NSSAI}
      - {name: ServiceAreaList, iei: "27", presence: O, format: TLV, length: "6-114", type_ref: ServiceAreaList}
      - {name: FullNameForNetwork, iei: "43", presence: O, format: TLV, length: "3-n", type_ref: NetworkName}
      - {name: ShortNameForNetwork, iei: "45", presence: O, format: TLV, length: "3-n", type_ref: NetworkName}
      - {name: LocalTimeZone, iei: "46", presence: O, format: TV, length: "2", type_ref: TimeZone}
