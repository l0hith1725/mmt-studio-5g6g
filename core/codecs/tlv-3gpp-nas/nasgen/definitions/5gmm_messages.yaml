    ies:
      - {name: SelectedNASSecurityAlgorithms, iei: null, presence: M, format: V, length: "1", type_ref: NASSecurityAlgorithms}
      - {name: NgKSI,                         iei: null, presence: M, format: V, length: "1/2", type_ref: NASKeySetIdentifier}
