      - {name: APNAMBR,             iei: "5E", presence: O, format: TLV, length: "4-8",  type_ref: APNAggregateMaximumBitRate}
      - {name: ESMCause,            iei: "58", presence: O, format: TV,  length: "2",    type_ref: ESMCause}
      - {name: ProtocolConfigurationOptions, iei: "27", presence: O, format: TLV, length: "3-253", type_ref: ProtocolConfigurationOptions}
      - {name: ConnectivityType,    iei: "B-", presence: O, format: TV,  length: "1",    type_ref: ConnectivityType}
      - {name: WLANOffloadIndication, iei: "C-", presence: O, format: TV, length: "1",   type_ref: WLANOffloadAcceptability}
      - {name: NBIFOMContainer,     iei: "33", presence: O, format: TLV, length: "3-257", type_ref: NBIFOMContainer}
      - {name: HeaderCompressionConfiguration, iei: "66", presence: O, format: TLV, length: "5-255", type_ref: HeaderCompressionConfiguration}
      - {name: ControlPlaneOnlyIndication, iei: "9-", presence: O, format: TV, length: "1", type_ref: ControlPlaneOnlyIndicator}
      - {name: ExtendedProtocolConfigurationOptions, iei: "7B", presence: O, format: TLV-E, length: "4-65538", type_ref: ExtendedProtocolConfigurationOptions}
      - {name: ServingPLMNRateControl, iei: "6E", presence: O, format: TLV, length: "4", type_ref: ServingPLMNRateControl}
      - {name: ExtendedAPNAMBR,     iei: "5F", presence: O, format: TLV, length: "8",    type_ref: ExtendedAPNAMBR}
      - {name: ExtendedEPSQoS,      iei: "7C", presence: O, format: TLV, length: "12",   type_ref: ExtendedEPSQoS}

