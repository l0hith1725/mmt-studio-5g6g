      - {name: SMSIndication, iei: "F-", presence: O, format: TV, length: "1", type_ref: Non3GPPNWProvidedPolicies}
      - {name: T3447Value, iei: "6C", presence: O, format: TLV, length: "3", type_ref: GPRSTimer3}
      - {name: CAGInformationList, iei: "75", presence: O, format: TLV-E, length: "3-n", type_ref: CAGInformationList}
      - {name: UERadioCapabilityID, iei: "67", presence: O, format: TLV, length: "3-n", type_ref: UERadioCapabilityID}
      - {name: UERadioCapabilityIDDeletionIndication, iei: "E-", presence: O, format: TV, length: "1", type_ref: UERadioCapabilityIDDeletionIndication}
      - {name: FivegsTrackingAreaIdentity, iei: "52", presence: O, format: TV, length: "7", type_ref: TrackingAreaIdentity5GS}

