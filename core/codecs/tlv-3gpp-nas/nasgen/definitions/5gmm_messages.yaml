#
# 5GMM messages — TS 24.501 clause 8.2.
# Each message mirrors the IE table in the spec. Where a message has many
# rarely-populated optional IEs, this file captures the commonly used subset
# and trims the long tail; add rows as needed.

messages:

  # -----------------------------------------------------------------
  # Registration procedure (§8.2.6 – 8.2.10)
  # -----------------------------------------------------------------

  - name: RegistrationRequest
    description: "Registration request — TS 24.501 Table 8.2.6.1.1"
    epd: 0x7E
    message_type: 0x41
    direction: ue_to_network
    ies:
      - {name: RegistrationType5GS, iei: null, presence: M, format: V,     length: "1/2",   type_ref: RegistrationType5GS}
      - {name: NgKSI,              iei: null, presence: M, format: V,     length: "1/2",   type_ref: NASKeySetIdentifier}
      - {name: MobileIdentity5GS,   iei: null, presence: M, format: LV-E,  length: "6-n",   type_ref: MobileIdentity5GS}
      - {name: NonCurrentNativeNASKSI, iei: "C-", presence: O, format: TV,   length: "1",    type_ref: NASKeySetIdentifier}
      - {name: MMCapability5G,      iei: "10", presence: O, format: TLV,   length: "4-15",  type_ref: MMCapability5G}
      - {name: UESecurityCapability, iei: "2E", presence: O, format: TLV,   length: "4-10",  type_ref: UESecurityCapability}
      - {name: RequestedNSSAI,      iei: "2F", presence: O, format: TLV,   length: "4-74",  type_ref: NSSAI}
      - {name: LastVisitedRegisteredTAI, iei: "52", presence: O, format: TV, length: "7",    type_ref: TrackingAreaIdentity5GS}
      - {name: S1UENetworkCapability, iei: "17", presence: O, format: TLV, length: "4-15",  type_ref: S1UENetworkCapability}
      - {name: UplinkDataStatus,    iei: "40", presence: O, format: TLV,   length: "4-34",  type_ref: UplinkDataStatus}
      - {name: PDUSessionStatus,    iei: "50", presence: O, format: TLV,   length: "4-34",  type_ref: PDUSessionStatus}
      - {name: MICOIndication,      iei: "B-", presence: O, format: TV,    length: "1",     type_ref: MICOIndication}
      - {name: UEStatus,            iei: "2B", presence: O, format: TLV,   length: "3",     type_ref: UEStatus}
      - {name: AdditionalGUTI,      iei: "77", presence: O, format: TLV-E, length: "14",    type_ref: MobileIdentity5GS}
      - {name: AllowedPDUSessionStatus, iei: "25", presence: O, format: TLV, length: "4-34", type_ref: AllowedPDUSessionStatus}
      - {name: UEUsageSetting,      iei: "18", presence: O, format: TLV,   length: "3",     type_ref: UEUsageSetting}
      - {name: RequestedDRXParameters, iei: "51", presence: O, format: TLV, length: "3",    type_ref: DRXParameters5GS}
      - {name: EPSNASMessageContainer, iei: "70", presence: O, format: TLV-E, length: "4-n", type_ref: EPSNASMessageContainer}
      - {name: LADNIndication,      iei: "74", presence: O, format: TLV-E, length: "3-811", type_ref: LADNIndication}
      - {name: PayloadContainerType, iei: "8-", presence: O, format: TV,   length: "1",     type_ref: PayloadContainerType}
      - {name: PayloadContainer,    iei: "7B", presence: O, format: TLV-E, length: "4-65538", type_ref: PayloadContainer}
      - {name: NetworkSlicingIndication, iei: "9-", presence: O, format: TV, length: "1",  type_ref: NetworkSlicingIndication}
      - {name: UEParametersUpdateStatus, iei: "53", presence: O, format: TLV, length: "3", type_ref: UEParametersUpdate}
      - {name: UERadioCapabilityID, iei: "67", presence: O, format: TLV,   length: "3-n",   type_ref: UERadioCapabilityID}
      - {name: RequestedMappedNSSAI, iei: "35", presence: O, format: TLV,  length: "3-42",  type_ref: NSSAI}
      - {name: AdditionalInformationRequested, iei: "48", presence: O, format: TLV, length: "3", type_ref: AdditionalInformationRequested}
      - {name: NASMessageContainer, iei: "71", presence: O, format: TLV-E, length: "4-n",   type_ref: NASMessageContainer}
      - {name: EPSBearerContextStatus, iei: "60", presence: O, format: TLV, length: "4",    type_ref: EPSBearerContextStatus}

  - name: RegistrationAccept
