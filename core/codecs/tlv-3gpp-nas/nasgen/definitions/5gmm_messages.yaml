    direction: network_to_ue
    ies:
      - {name: Cause5GMM, iei: null, presence: M, format: V, length: "1", type_ref: FiveGMMCause}
      - {name: PDUSessionStatus, iei: "50", presence: O, format: TLV, length: "4-34", type_ref: PDUSessionStatus}
      - {name: T3346Value, iei: "5F", presence: O, format: TLV, length: "3", type_ref: GPRSTimer2}
      - {name: EAPMessage, iei: "78", presence: O, format: TLV-E, length: "7-1503", type_ref: EAPMessage}
      - {name: T3448Value, iei: "6B", presence: O, format: TLV, length: "3", type_ref: GPRSTimer3}
      - {name: CAGInformationList, iei: "75", presence: O, format: TLV-E, length: "3-n", type_ref: CAGInformationList}

