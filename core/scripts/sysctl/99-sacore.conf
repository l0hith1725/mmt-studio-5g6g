# /etc/sysctl.d/99-sacore.conf — MMT Studio Core (sacore-web) kernel tuning.
#
# Applied by install.sh (sysctl --system) and re-applied on every boot
# because /etc/sysctl.d/ is the standard persistence path on Linux.
#
# Each value has a short justification; for the full rationale and the
# matrix of defaults vs recommended see docs/OBSERVABILITY.md and the
# "Kernel tuning" section of the README.
#
# Verify at runtime with scripts/sysctl-check.sh — reports OK / LOW /
# OVERRIDE per value so ops can spot when an upgrade reverted a tweak.

# ───── Core socket buffers ─────────────────────────────────────────────
# Each SCTP association asks for 4 MB SO_SNDBUF / SO_RCVBUF in
# transport_linux.go; the kernel silently clamps to rmem_max / wmem_max
# if these are lower than the request. Ubuntu ships 208 KB which is
# wildly too small for 16-UE registration bursts.
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# Per-socket ancillary-data (cmsg) buffer cap. NGAP uses cmsg for
# PPID + SCTP_SNDRCV stream info; 20 KB default is tight when many
# bundled messages fire at once.
net.core.optmem_max = 65536

# ───── SCTP-specific ─────────────────────────────────────────────────
# Protocol-level memory watermarks in pages (4 KB on x86_64). Default
# on Ubuntu is ~768/1024/1536 which is actually close to our
# recommendation — stated here explicitly so later kernel upgrades
# don't silently change the number.
# Format: low_pressure, pressure, hard_limit (pages).
net.sctp.sctp_mem = 768 1024 1536

# Receive/send auto-tune triple (min, default, max). Max matches
# net.core.rmem_max / wmem_max above so per-socket overrides don't
# get clamped.
net.sctp.sctp_rmem = 4096 1048576 8388608
net.sctp.sctp_wmem = 4096 1048576 8388608

# Keep per-association buffering (vs per-socket): 0 means each SCTP
# association gets its own rwnd budget, so one slow gNB can't stall
# others sharing the listener fd.
net.sctp.rcvbuf_policy = 0
net.sctp.sndbuf_policy = 0

# Kernel-default retransmit counts. The AMF overrides these per-socket
# via SCTP_ASSOCINFO / SCTP_PEER_ADDR_PARAMS (see nf/amf/ngap/
# transport_linux.go); setting the kernel defaults keeps /proc/net/
# sctp/* stats meaningful and protects any non-sacore SCTP user on
# the same box.
net.sctp.association_max_retrans = 30
net.sctp.path_max_retrans = 5
net.sctp.max_init_retransmits = 8

# Heartbeat interval (ms) on idle paths. 30 s is the 4960 default
# and works for lab + production; drop to 10000 if you need fast
# detection of dead multi-homed paths.
net.sctp.hb_interval = 30000

# Cookie validity window for INIT / COOKIE-ECHO exchange.
net.sctp.valid_cookie_life = 60000

# ───── TCP (admin REST, Prometheus scrape, SBI) ───────────────────────
# The web-service listens on :5000; these make bursts of
# simultaneous scrapes and GUI opens not stall.
net.ipv4.tcp_rmem = 4096 524288 8388608
net.ipv4.tcp_wmem = 4096 524288 8388608
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1

# ───── General network stack ──────────────────────────────────────────
# Listen-queue depth — matters under NG-Reset storms when every gNB
# reconnects at once; the kernel default (4096) drops connections
# when exceeded.
net.core.somaxconn = 65535

# Per-CPU RX ring queue for NAPI. High-pps UPF traffic + bursty NGAP
# signalling benefit; 1000 is very conservative.
net.core.netdev_max_backlog = 65535

# Packets NAPI processes per poll — bump so a single core doesn't
# starve under burst.
net.core.netdev_budget = 600

# Ephemeral-port range — PFCP clients, outbound SBI, Prometheus
# remote-write all allocate ephemeral ports. Default caps at ~28 K
# which is tight at scale.
net.ipv4.ip_local_port_range = 10240 65535
