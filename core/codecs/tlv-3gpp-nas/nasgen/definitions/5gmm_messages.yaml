      - {name: NetworkSlicingIndication, iei: "9-", presence: O, format: TV, length: "1", type_ref: NetworkSlicingIndication}
      - {name: ConfiguredNSSAI, iei: "31", presence: O, format: TLV, length: "4-146", type_ref: NSSAI}
      - {name: RejectedNSSAI, iei: "11", presence: O, format: TLV, length: "4-42", type_ref: RejectedNSSAI}
