  # -----------------------------------------------------------------
  # Authentication procedure (§8.2.1 – 8.2.5)
  # -----------------------------------------------------------------

  - name: AuthenticationRequest
    description: "Authentication request — TS 24.501 Table 8.2.1.1.1"
    epd: 0x7E
    message_type: 0x56
    direction: network_to_ue
    ies:
      - {name: NgKSI,           iei: null, presence: M, format: V,   length: "1/2", type_ref: NASKeySetIdentifier}
      - {name: Spare,           iei: null, presence: M, format: V,   length: "1/2", type_ref: NASKeySetIdentifier}
      - {name: ABBA,            iei: null, presence: M, format: LV,  length: "3-n", type_ref: ABBA}
      - {name: AuthenticationParameterRAND, iei: "21", presence: O, format: TV, length: "17", type_ref: AuthenticationParameterRAND}
      - {name: AuthenticationParameterAUTN, iei: "20", presence: O, format: TLV, length: "18", type_ref: AuthenticationParameterAUTN}
      - {name: EAPMessage,      iei: "78", presence: O, format: TLV-E, length: "7-1503", type_ref: EAPMessage}

  - name: AuthenticationResponse
    description: "Authentication response — TS 24.501 Table 8.2.2.1.1"
    epd: 0x7E
    message_type: 0x57
    direction: ue_to_network
    ies:
      - {name: AuthenticationResponseParameter, iei: "2D", presence: O, format: TLV, length: "6-18", type_ref: AuthenticationResponseParameter}
      - {name: EAPMessage, iei: "78", presence: O, format: TLV-E, length: "7-1503", type_ref: EAPMessage}

  - name: AuthenticationResult
    description: "Authentication result — TS 24.501 Table 8.2.3.1.1"
    epd: 0x7E
    message_type: 0x5A
    direction: network_to_ue
    ies:
      - {name: NgKSI,      iei: null, presence: M, format: V,     length: "1/2", type_ref: NASKeySetIdentifier}
      - {name: Spare,      iei: null, presence: M, format: V,     length: "1/2", type_ref: NASKeySetIdentifier}
      - {name: EAPMessage, iei: null, presence: M, format: LV-E,  length: "6-1502", type_ref: EAPMessage}
      - {name: ABBA,       iei: "38", presence: O, format: TLV,   length: "4-n", type_ref: ABBA}

  - name: AuthenticationFailure
    description: "Authentication failure — TS 24.501 Table 8.2.4.1.1"
    epd: 0x7E
