version: "3.8"

services:
  satester:
    build:
      context: ..
      dockerfile: build/Dockerfile
    container_name: satester
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5001:5001"
