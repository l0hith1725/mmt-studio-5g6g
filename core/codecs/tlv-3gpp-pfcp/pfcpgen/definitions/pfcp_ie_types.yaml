#
# PFCP IE type definitions — TS 29.244 §8.1.2, §8.2.
# Type codes from Table 8.1.2-1.
#
# Shape conventions:
#   * go_type override — runtime type handles encoding (FSEID, NodeID, FTEID).
#   * Grouped IE — `grouped: true` + `members: [...]` listing sub-IE entries.
#   * Byte-container (default) — no `fields`, no `grouped`. Round-trips as raw
#     bytes via `Value []byte`. min/max_length enforced on decode.
#
# Primitive IEs are kept as byte-containers; accessor-level decomposition is
# a non-breaking YAML refinement.

ie_types:

  # ===================================================================
  # Runtime-typed aliases
  # ===================================================================

  - name: FSEID
    type_code: 57
    description: "F-SEID — session endpoint identifier + IP"
    min_length: 13
    max_length: 25
    go_type: FSEID

  - name: NodeID
    type_code: 60
    description: "Node ID (IPv4/IPv6/FQDN)"
    min_length: 2
    max_length: 256
    go_type: NodeID

  - name: FTEID
    type_code: 21
    description: "F-TEID (TEID + UP IP address)"
    min_length: 1
    max_length: 25
    go_type: FTEID

  # ===================================================================
  # Primitive IEs (byte-containers)
  # ===================================================================

  - name: Cause
    type_code: 19
    description: "Cause — TS 29.244 §8.2.1"
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bytes: 1
        values:
          1: "request_accepted"
          64: "request_rejected"
          65: "session_context_not_found"
          66: "mandatory_ie_missing"
          67: "conditional_ie_missing"
          68: "invalid_length"
          69: "mandatory_ie_incorrect"
          70: "invalid_forwarding_policy"
          71: "invalid_ftied_allocation_option"
          72: "no_established_pfcp_association"
          73: "rule_creation_modification_failure"
          74: "pfcp_entity_in_congestion"
          75: "no_resources_available"
          76: "service_not_supported"
          77: "system_failure"
          78: "redirection_requested"

  - name: SourceInterface
    type_code: 20
    description: "Source Interface — TS 29.244 §8.2.2"
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bits: 4
        offset: 0
        values:
          0: "access"
          1: "core"
          2: "sgi_lan_n6_lan"
          3: "cp_function"
          4: "five_g_vn_internal"
  - {name: NetworkInstance, type_code: 22, description: "Network Instance", min_length: 1, max_length: 255}
  - name: SDFFilter
    type_code: 23
    description: "SDF Filter — TS 29.244 §8.2.5"
    # Octet 5 flags + octet 6 spare = 2-byte minimum when all flag
    # bits are clear. Sub-fields per Figure 8.2.5-1 — emitted by the
    # generator via kind: flag_conditional.
    min_length: 2
    max_length: 65535
    kind: flag_conditional
    spare_octet_after_flags: true
    fields:
      - {name: FlowDescription,        bit: 0, type: utf8,        length_prefix: u16}
      - {name: ToSTrafficClass,        bit: 1, type: uint16}
      - {name: SecurityParameterIndex, bit: 2, type: uint32}
      - {name: FlowLabel,              bit: 3, type: uint24}
      - {name: SDFFilterID,            bit: 4, type: uint32}
      - {name: SMMII,                  bit: 5, type: smmii_list}
  - {name: ApplicationID, type_code: 24, description: "Application ID", min_length: 1, max_length: 255}
  - name: GateStatus
    type_code: 25
    description: "Gate Status — TS 29.244 §8.2.7"
    min_length: 1
    max_length: 1
    fields:
      - name: DLGate
        bits: 2
        offset: 2
        values:
          0: "dl_open"
          1: "dl_closed"
      - name: ULGate
        bits: 2
        offset: 0
        values:
          0: "ul_open"
          1: "ul_closed"

  - name: MBR
    type_code: 26
    description: "MBR — 40-bit UL + 40-bit DL kbps (TS 29.244 §8.2.8)"
    # Hand-modeled in runtime so consumers see uint64 UL/DL fields
    # in kbps directly (§8.2.8 line 21380 verbatim: "encoded as
    # kilobits per second"). 5-byte big-endian on the wire.
    min_length: 10
    max_length: 10
    go_type: MBR

  - name: GBR
    type_code: 27
    description: "GBR — 40-bit UL + 40-bit DL kbps (TS 29.244 §8.2.9)"
    # Same shape + unit as MBR — runtime exposes
    # `type GBR = MBR` so callers can use either name.
    min_length: 10
    max_length: 10
    go_type: GBR

  - name: QERCorrelationID
    type_code: 28
    description: "QER Correlation ID — TS 29.244 §8.2.10"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4

  - name: Precedence
    type_code: 29
    description: "Precedence (32-bit) — TS 29.244 §8.2.11"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4
  - {name: TransportLevelMarking, type_code: 30, description: "Transport Level Marking (2-byte DSCP)", min_length: 2, max_length: 2}
  - name: VolumeThreshold
    type_code: 31
    description: "Volume Threshold — TS 29.244 §8.2.13"
    # Octet 5 flags (TOVOL=bit 0, ULVOL=bit 1, DLVOL=bit 2);
    # at least one shall be set. Each set flag appends an
    # Unsigned64 (8-byte big-endian) volume in octets.
    min_length: 1
    max_length: 25
    kind: flag_conditional
    fields:
      - {name: TotalVolume,    bit: 0, type: uint64}
      - {name: UplinkVolume,   bit: 1, type: uint64}
      - {name: DownlinkVolume, bit: 2, type: uint64}
  - name: TimeThreshold
    type_code: 32
    description: "Time Threshold — TS 29.244 §8.2.14 (uint32 seconds)"
    min_length: 4
    max_length: 4
    fields:
      - {name: Seconds, bytes: 4}
  - {name: MonitoringTime, type_code: 33, description: "Monitoring Time", min_length: 4, max_length: 4}
  - name: SubsequentVolumeThreshold
    type_code: 34
    description: "Subsequent Volume Threshold — TS 29.244 §8.2.16 (same shape as Volume Threshold)"
    min_length: 1
    max_length: 25
    kind: flag_conditional
    fields:
      - {name: TotalVolume,    bit: 0, type: uint64}
      - {name: UplinkVolume,   bit: 1, type: uint64}
      - {name: DownlinkVolume, bit: 2, type: uint64}
  - name: SubsequentTimeThreshold
    type_code: 35
    description: "Subsequent Time Threshold — TS 29.244 §8.2.17 (uint32 seconds)"
    min_length: 4
    max_length: 4
    fields:
      - {name: Seconds, bytes: 4}
  - {name: InactivityDetectionTime, type_code: 36, description: "Inactivity Detection Time", min_length: 4, max_length: 4}
  - name: ReportingTriggers
    type_code: 37
    description: "Reporting Triggers — TS 29.244 §8.2.19"
    min_length: 2
    max_length: 3
    fields:
      - name: Flags
        bytes: 2
  - {name: RedirectInformation, type_code: 38, description: "Redirect Information", min_length: 1, max_length: 65535}
  - name: ReportType
    type_code: 39
    description: "Report Type — TS 29.244 §8.2.21"
    min_length: 1
    max_length: 1
    fields:
      - name: UISR
        bits: 1
        offset: 6
      - name: SESR
        bits: 1
        offset: 5
      - name: TMIR
        bits: 1
        offset: 4
      - name: UPIR
        bits: 1
        offset: 3
      - name: ERIR
        bits: 1
        offset: 2
      - name: USAR
        bits: 1
        offset: 1
      - name: DLDR
        bits: 1
        offset: 0

  - name: OffendingIE
    type_code: 40
    description: "Offending IE (type code) — TS 29.244 §8.2.22"
    min_length: 2
    max_length: 2
    fields:
      - name: Value
        bytes: 2
  - {name: ForwardingPolicy, type_code: 41, description: "Forwarding Policy", min_length: 1, max_length: 255}
  - name: DestinationInterface
    type_code: 42
    description: "Destination Interface — TS 29.244 §8.2.24"
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bits: 4
        offset: 0
        values:
          0: "access"
          1: "core"
          2: "sgi_lan_n6_lan"
          3: "cp_function"
          4: "li_function"
          5: "five_g_vn_internal"
  - {name: UPFunctionFeatures, type_code: 43, description: "UP Function Features", min_length: 2, max_length: 32}
  - name: ApplyAction
    type_code: 44
    description: "Apply Action — TS 29.244 §8.2.26"
    min_length: 1
    max_length: 2
    fields:
      - name: DUPL
        bits: 1
        offset: 4
      - name: NOCP
        bits: 1
        offset: 3
      - name: BUFF
        bits: 1
        offset: 2
      - name: FORW
        bits: 1
        offset: 1
      - name: DROP
        bits: 1
        offset: 0
  - {name: DownlinkDataServiceInformation, type_code: 45, description: "Downlink Data Service Information", min_length: 1, max_length: 3}
  - {name: DownlinkDataNotificationDelay, type_code: 46, description: "Downlink Data Notification Delay", min_length: 1, max_length: 1}
  - {name: DLBufferingDuration, type_code: 47, description: "DL Buffering Duration", min_length: 1, max_length: 1}
  - {name: DLBufferingSuggestedPacketCount, type_code: 48, description: "DL Buffering Suggested Packet Count", min_length: 1, max_length: 2}
  - {name: PFCPSMReqFlags, type_code: 49, description: "PFCPSMReq-Flags", min_length: 1, max_length: 1}
  - {name: PFCPSRRspFlags, type_code: 50, description: "PFCPSRRsp-Flags", min_length: 1, max_length: 1}
  - {name: SequenceNumber, type_code: 52, description: "Sequence Number (report)", min_length: 4, max_length: 4}
  - {name: Metric, type_code: 53, description: "Metric", min_length: 1, max_length: 1}
  - {name: Timer, type_code: 55, description: "Timer (unit+value)", min_length: 1, max_length: 1}
  - name: PacketDetectionRuleID
    type_code: 56
    description: "PDR ID (16-bit) — TS 29.244 §8.2.36"
    min_length: 2
    max_length: 2
    fields:
      - name: Value
        bytes: 2
  - {name: PFDContents, type_code: 61, description: "PFD Contents", min_length: 1, max_length: 65535}
  - name: MeasurementMethod
    type_code: 62
    description: "Measurement Method — TS 29.244 §8.2.40"
    min_length: 1
    max_length: 1
    fields:
      - name: EVENT
        bits: 1
        offset: 2
      - name: VOLUM
        bits: 1
        offset: 1
      - name: DURAT
        bits: 1
        offset: 0

  - name: UsageReportTrigger
    type_code: 63
    description: "Usage Report Trigger — TS 29.244 §8.2.41"
    min_length: 2
    max_length: 3
    fields:
      - name: Flags
        bytes: 2
  - name: MeasurementPeriod
    type_code: 64
    description: "Measurement Period (seconds, 32-bit) — TS 29.244 §8.2.42"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4
  - {name: FQCSID, type_code: 65, description: "FQ-CSID", min_length: 1, max_length: 65535}
  - {name: VolumeMeasurement, type_code: 66, description: "Volume Measurement", min_length: 1, max_length: 49}
  - name: DurationMeasurement
    type_code: 67
    description: "Duration Measurement (seconds, 32-bit) — TS 29.244 §8.2.45"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4
  - {name: TimeOfFirstPacket, type_code: 69, description: "Time of First Packet", min_length: 4, max_length: 4}
  - {name: TimeOfLastPacket, type_code: 70, description: "Time of Last Packet", min_length: 4, max_length: 4}
  - {name: QuotaHoldingTime, type_code: 71, description: "Quota Holding Time", min_length: 4, max_length: 4}
  - {name: DroppedDLTrafficThreshold, type_code: 72, description: "Dropped DL Traffic Threshold", min_length: 1, max_length: 17}
  - {name: VolumeQuota, type_code: 73, description: "Volume Quota", min_length: 1, max_length: 25}
  - {name: TimeQuota, type_code: 74, description: "Time Quota", min_length: 4, max_length: 4}
  - {name: StartTime, type_code: 75, description: "Start Time", min_length: 4, max_length: 4}
  - {name: EndTime, type_code: 76, description: "End Time", min_length: 4, max_length: 4}
  - name: URRID
    type_code: 81
    description: "URR ID (32-bit) — TS 29.244 §8.2.54"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4

  - name: LinkedURRID
    type_code: 82
    description: "Linked URR ID — TS 29.244 §8.2.55"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4
  - name: OuterHeaderCreation
    type_code: 84
    description: "Outer Header Creation — TS 29.244 §8.2.56"
    # Description bitmap (16 bits) + presence-driven sub-fields per
    # Table 8.2.56-1. Hand-modeled in runtime.OuterHeaderCreation
    # because field presence depends on COMBINATIONS of Description
    # bits — beyond the current generator schema.
    min_length: 1
    max_length: 25
    go_type: OuterHeaderCreation
  - name: BARID
    type_code: 88
    description: "BAR ID (8-bit) — TS 29.244 §8.2.59"
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bytes: 1
  - {name: CPFunctionFeatures, type_code: 89, description: "CP Function Features", min_length: 1, max_length: 4}
  - {name: UsageInformation, type_code: 90, description: "Usage Information", min_length: 1, max_length: 1}
  - {name: ApplicationInstanceID, type_code: 91, description: "Application Instance ID", min_length: 1, max_length: 65535}
  - {name: FlowInformation, type_code: 92, description: "Flow Information", min_length: 3, max_length: 65535}
  - name: UEIPAddress
    type_code: 93
    description: "UE IP Address — TS 29.244 §8.2.62"
    # Flag-conditional with V4/V6/CHV4/CHV6/IPv6D/IP6PL/S-D bits.
    # Hand-modeled in runtime.UEIPAddress because the V4-vs-CHV4 and
    # IPv6D-vs-IP6PL interactions exceed the current generator's
    # flag_conditional schema.
    min_length: 1
    max_length: 21
    go_type: UEIPAddress
  - {name: PacketRate, type_code: 94, description: "Packet Rate", min_length: 1, max_length: 8}
  - {name: OuterHeaderRemoval, type_code: 95, description: "Outer Header Removal", min_length: 1, max_length: 2}
  - name: RecoveryTimeStamp
    type_code: 96
    description: "Recovery Time Stamp (NTP epoch seconds, 32-bit) — TS 29.244 §8.2.65"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4
  - {name: DLFlowLevelMarking, type_code: 97, description: "DL Flow Level Marking", min_length: 1, max_length: 5}
  - {name: HeaderEnrichment, type_code: 98, description: "Header Enrichment", min_length: 1, max_length: 255}
  - {name: MeasurementInformation, type_code: 100, description: "Measurement Information", min_length: 1, max_length: 1}
  - {name: NodeReportType, type_code: 101, description: "Node Report Type", min_length: 1, max_length: 1}
  - {name: RemoteGTPUPeer, type_code: 103, description: "Remote GTP-U Peer", min_length: 1, max_length: 65535}
  - {name: URSEQN, type_code: 104, description: "UR-SEQN", min_length: 4, max_length: 4}
  - {name: ActivatePredefinedRules, type_code: 106, description: "Activate Predefined Rules", min_length: 1, max_length: 255}
  - {name: DeactivatePredefinedRules, type_code: 107, description: "Deactivate Predefined Rules", min_length: 1, max_length: 255}
  - name: FARID
    type_code: 108
    description: "FAR ID (32-bit) — TS 29.244 §8.2.74"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4

  - name: QERID
    type_code: 109
    description: "QER ID (32-bit) — TS 29.244 §8.2.75"
    min_length: 4
    max_length: 4
    fields:
      - name: Value
        bytes: 4
  - {name: OCIFlags, type_code: 110, description: "OCI Flags", min_length: 1, max_length: 1}
  - {name: PFCPAssociationReleaseRequest, type_code: 111, description: "PFCP Association Release Request", min_length: 1, max_length: 1}
  - {name: GracefulReleasePeriod, type_code: 112, description: "Graceful Release Period", min_length: 1, max_length: 1}
  - name: PDNType
    type_code: 113
    description: "PDN Type — TS 29.244 §8.2.79"
    # Octet 5 low 3 bits per Table 8.2.79-1: 1=IPv4, 2=IPv6,
    # 3=IPv4v6, 4=Non-IP, 5=Ethernet. Generator emits Value uint8
    # + named consts (PDNTypeIpv4 etc.) from the values map.
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bits: 3
        offset: 0
        values:
          1: Ipv4
          2: Ipv6
          3: Ipv4v6
          4: NonIp
          5: Ethernet
  - {name: FailedRuleID, type_code: 114, description: "Failed Rule ID", min_length: 5, max_length: 5}
  - {name: TimeQuotaMechanism, type_code: 115, description: "Time Quota Mechanism", min_length: 5, max_length: 5}
  - {name: UserPlaneIPResourceInformation, type_code: 116, description: "UP IP Resource Information", min_length: 1, max_length: 255}
  - {name: UserPlaneInactivityTimer, type_code: 117, description: "UP Inactivity Timer", min_length: 4, max_length: 4}
  - {name: Multiplier, type_code: 119, description: "Multiplier", min_length: 9, max_length: 9}
  - {name: AggregatedURRID, type_code: 120, description: "Aggregated URR ID", min_length: 4, max_length: 4}
  - {name: SubsequentVolumeQuota, type_code: 121, description: "Subsequent Volume Quota", min_length: 1, max_length: 25}
  - {name: SubsequentTimeQuota, type_code: 122, description: "Subsequent Time Quota", min_length: 4, max_length: 4}
  - {name: RQI, type_code: 123, description: "RQI", min_length: 1, max_length: 1}
  - name: QFI
    type_code: 124
    description: "QFI — TS 29.244 §8.2.89"
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bits: 6
        offset: 0
  - {name: QueryURRReference, type_code: 125, description: "Query URR Reference", min_length: 4, max_length: 4}
  - {name: AdditionalUsageReportsInformation, type_code: 126, description: "Additional Usage Reports Information", min_length: 2, max_length: 2}
  - name: TrafficEndpointID
    type_code: 131
    description: "Traffic Endpoint ID — TS 29.244 §8.2.92"
    min_length: 1
    max_length: 1
    fields:
      - name: Value
        bytes: 1
  - {name: MACAddress, type_code: 133, description: "MAC Address", min_length: 1, max_length: 25}
  - {name: CTAG, type_code: 134, description: "C-TAG", min_length: 3, max_length: 3}
  - {name: STAG, type_code: 135, description: "S-TAG", min_length: 3, max_length: 3}
  - {name: Ethertype, type_code: 136, description: "Ethertype", min_length: 2, max_length: 2}
  - {name: Proxying, type_code: 137, description: "Proxying", min_length: 1, max_length: 1}
  - {name: EthernetFilterID, type_code: 138, description: "Ethernet Filter ID", min_length: 4, max_length: 4}
  - {name: EthernetFilterProperties, type_code: 139, description: "Ethernet Filter Properties", min_length: 1, max_length: 1}
  - {name: SuggestedBufferingPacketsCount, type_code: 140, description: "Suggested Buffering Packets Count", min_length: 1, max_length: 1}
  - name: UserID
    type_code: 141
    description: "User ID — TS 29.244 §8.2.101"
    # Octet 5 flags (IMSIF/IMEIF/MSISDNF/NAIF/SUPIF/GPSIF/PEIF) —
    # bit 0..6. Each set flag appends a length-prefixed sub-field
    # of the spec-typed primitive listed below. IMSI/IMEI/MSISDN are
    # digit strings TBCD-encoded on the wire per TS 29.274 §8.3 / §8.10.
    min_length: 1
    max_length: 65535
    kind: flag_conditional
    fields:
      - {name: IMSI,   bit: 0, type: tbcd_digits, length_prefix: u8}
      - {name: IMEI,   bit: 1, type: tbcd_digits, length_prefix: u8}
      - {name: MSISDN, bit: 2, type: tbcd_digits, length_prefix: u8}
      - {name: NAI,    bit: 3, type: utf8,        length_prefix: u8}
      - {name: SUPI,   bit: 4, type: utf8,        length_prefix: u8}
      - {name: GPSI,   bit: 5, type: utf8,        length_prefix: u8}
      - {name: PEI,    bit: 6, type: utf8,        length_prefix: u8}
  - {name: EthernetPDUSessionInformation, type_code: 142, description: "Ethernet PDU Session Information", min_length: 1, max_length: 1}
  - {name: MACAddressesDetected, type_code: 144, description: "MAC Addresses Detected", min_length: 1, max_length: 65535}
  - {name: MACAddressesRemoved, type_code: 145, description: "MAC Addresses Removed", min_length: 1, max_length: 65535}
  - {name: EthernetInactivityTimer, type_code: 146, description: "Ethernet Inactivity Timer", min_length: 4, max_length: 4}
  - {name: EventQuota, type_code: 148, description: "Event Quota", min_length: 4, max_length: 4}
  - {name: EventThreshold, type_code: 149, description: "Event Threshold", min_length: 4, max_length: 4}
  - {name: SubsequentEventQuota, type_code: 150, description: "Subsequent Event Quota", min_length: 4, max_length: 4}
  - {name: SubsequentEventThreshold, type_code: 151, description: "Subsequent Event Threshold", min_length: 4, max_length: 4}
  - {name: TraceInformation, type_code: 152, description: "Trace Information", min_length: 1, max_length: 65535}
  - {name: FramedRoute, type_code: 153, description: "Framed-Route", min_length: 1, max_length: 65535}
  - {name: FramedRouting, type_code: 154, description: "Framed-Routing", min_length: 4, max_length: 4}
  - {name: FramedIPv6Route, type_code: 155, description: "Framed-IPv6-Route", min_length: 1, max_length: 65535}
  - {name: EventTimeStamp, type_code: 156, description: "Event Time Stamp", min_length: 4, max_length: 4}
  - {name: AveragingWindow, type_code: 157, description: "Averaging Window", min_length: 4, max_length: 4}
  - {name: PagingPolicyIndicator, type_code: 158, description: "Paging Policy Indicator", min_length: 1, max_length: 1}
  - name: APNDNN
    type_code: 159
    description: "APN/DNN — TS 29.244 §8.2.117"
    # APN/DNN per TS 23.003 §9.1: dotted labels, each label
    # length-prefixed on the wire (DNS-style). Same encoding the
    # NAS DNN IE (TS 24.501 §9.11.2.1B) uses; runtime owns it.
    min_length: 1
    max_length: 255
    go_type: APNDNN
  - {name: ThreeGPPInterfaceType, type_code: 160, description: "3GPP Interface Type", min_length: 1, max_length: 1}
  - {name: PFCPSRReqFlags, type_code: 161, description: "PFCPSRReq-Flags", min_length: 1, max_length: 1}
  - {name: PFCPAUReqFlags, type_code: 162, description: "PFCPAUReq-Flags", min_length: 1, max_length: 1}
  - {name: ActivationTime, type_code: 163, description: "Activation Time", min_length: 4, max_length: 4}
  - {name: DeactivationTime, type_code: 164, description: "Deactivation Time", min_length: 4, max_length: 4}
  - name: MARID
    type_code: 170
    description: "MAR ID (16-bit) — TS 29.244 §8.2.130"
    min_length: 2
    max_length: 2
    fields:
