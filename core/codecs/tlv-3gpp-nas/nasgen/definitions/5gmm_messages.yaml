      - {name: AllowedNSSAI,       iei: "15", presence: O, format: TLV,   length: "4-74", type_ref: NSSAI}
      - {name: RejectedNSSAI,      iei: "11", presence: O, format: TLV,   length: "4-42", type_ref: RejectedNSSAI}
      - {name: ConfiguredNSSAI,    iei: "31", presence: O, format: TLV,   length: "4-146", type_ref: NSSAI}
      - {name: NetworkFeatureSupport, iei: "21", presence: O, format: TLV, length: "3-5", type_ref: FiveGSNetworkFeatureSupport}
      - {name: PDUSessionStatus,   iei: "50", presence: O, format: TLV,   length: "4-34", type_ref: PDUSessionStatus}
      - {name: PDUSessionReactivationResult, iei: "26", presence: O, format: TLV, length: "4-34", type_ref: PDUSessionReactivationResult}
      - {name: PDUSessionReactivationResultErrorCause, iei: "72", presence: O, format: TLV-E, length: "5-515", type_ref: PDUSessionReactivationResultErrorCause}
      - {name: LADNInformation,    iei: "79", presence: O, format: TLV-E, length: "12-1707", type_ref: LADNInformation}
      - {name: MICOIndication,     iei: "B-", presence: O, format: TV,    length: "1", type_ref: MICOIndication}
      - {name: NetworkSlicingIndication, iei: "9-", presence: O, format: TV, length: "1", type_ref: NetworkSlicingIndication}
      - {name: ServiceAreaList,    iei: "27", presence: O, format: TLV,   length: "6-114", type_ref: ServiceAreaList}
      - {name: T3512Value,         iei: "5E", presence: O, format: TLV,   length: "3", type_ref: GPRSTimer3}
      - {name: Non3GPPDeregistrationTimerValue, iei: "5D", presence: O, format: TLV, length: "3", type_ref: GPRSTimer2}
      - {name: T3502Value,         iei: "16", presence: O, format: TLV,   length: "3", type_ref: GPRSTimer2}
      - {name: EmergencyNumberList, iei: "34", presence: O, format: TLV,  length: "5-50", type_ref: EmergencyNumberList}
      - {name: ExtendedEmergencyNumberList, iei: "7A", presence: O, format: TLV-E, length: "7-65538", type_ref: ExtendedEmergencyNumberList}
      - {name: SORTransparentContainer, iei: "73", presence: O, format: TLV-E, length: "20-n", type_ref: SORTransparentContainer}
      - {name: EAPMessage,         iei: "78", presence: O, format: TLV-E, length: "7-1503", type_ref: EAPMessage}
      - {name: NSSAIInclusionMode, iei: "A-", presence: O, format: TV,    length: "1", type_ref: AccessType}
      - {name: OperatorDefinedAccessCategoryDefinitions, iei: "76", presence: O, format: TLV-E, length: "3-8000", type_ref: OperatorDefinedAccessCategoryDefinitions}
      - {name: NegotiatedDRXParameters, iei: "51", presence: O, format: TLV, length: "3", type_ref: DRXParameters5GS}
      - {name: Non3GPPNWProvidedPolicies, iei: "D-", presence: O, format: TV, length: "1", type_ref: Non3GPPNWProvidedPolicies}
      - {name: EPSBearerContextStatus, iei: "60", presence: O, format: TLV, length: "4", type_ref: EPSBearerContextStatus}
      - {name: NegotiatedExtendedDRXParameters, iei: "6E", presence: O, format: TLV, length: "3", type_ref: GPRSTimer3}
      - {name: T3447Value,         iei: "6C", presence: O, format: TLV,   length: "3", type_ref: GPRSTimer3}
      - {name: T3448Value,         iei: "6B", presence: O, format: TLV,   length: "3", type_ref: GPRSTimer3}
      - {name: T3324Value,         iei: "6A", presence: O, format: TLV,   length: "3", type_ref: GPRSTimer3}
      - {name: UERadioCapabilityID, iei: "67", presence: O, format: TLV,  length: "3-n", type_ref: UERadioCapabilityID}
      - {name: UERadioCapabilityIDDeletionIndication, iei: "E-", presence: O, format: TV, length: "1", type_ref: UERadioCapabilityIDDeletionIndication}
      - {name: PendingNSSAI,       iei: "39", presence: O, format: TLV,   length: "4-146", type_ref: NSSAI}
      - {name: CipheringKeyData,   iei: "74", presence: O, format: TLV-E, length: "34-n", type_ref: CAGInformationList}
      - {name: CAGInformationList, iei: "75", presence: O, format: TLV-E, length: "3-n", type_ref: CAGInformationList}
      - {name: TruncatedGUTI5GSTMSIConfiguration, iei: "1B", presence: O, format: TLV, length: "3", type_ref: TruncatedGUTI5G}
      - {name: WUSAssistanceInformation, iei: "1C", presence: O, format: TLV, length: "3-n", type_ref: WUSAssistanceInformation}

  - name: RegistrationComplete
    description: "Registration complete — TS 24.501 Table 8.2.8.1.1"
    epd: 0x7E
    message_type: 0x43
    direction: ue_to_network
    ies:
      - {name: SORTransparentContainer, iei: "73", presence: O, format: TLV-E, length: "20-n", type_ref: SORTransparentContainer}

  - name: RegistrationReject
    description: "Registration reject — TS 24.501 Table 8.2.9.1.1"
    epd: 0x7E
    message_type: 0x44
    direction: network_to_ue
    ies:
      - {name: Cause5GMM, iei: null, presence: M, format: V, length: "1", type_ref: FiveGMMCause}
      - {name: T3346Value, iei: "5F", presence: O, format: TLV, length: "3", type_ref: GPRSTimer2}
      - {name: T3502Value, iei: "16", presence: O, format: TLV, length: "3", type_ref: GPRSTimer2}
      - {name: EAPMessage, iei: "78", presence: O, format: TLV-E, length: "7-1503", type_ref: EAPMessage}
      - {name: RejectedNSSAI, iei: "69", presence: O, format: TLV, length: "4-42", type_ref: RejectedNSSAI}
      - {name: CAGInformationList, iei: "75", presence: O, format: TLV-E, length: "3-n", type_ref: CAGInformationList}

  # -----------------------------------------------------------------
  # Deregistration procedure (§8.2.11 – 8.2.14)
  # -----------------------------------------------------------------

  - name: DeregistrationRequestUEOriginating
    description: "Deregistration request (UE originating) — TS 24.501 Table 8.2.12.1.1"
    epd: 0x7E
    message_type: 0x45
    direction: ue_to_network
    ies:
      - {name: NgKSI,             iei: null, presence: M, format: V,    length: "1/2", type_ref: NASKeySetIdentifier}
      - {name: DeregistrationType, iei: null, presence: M, format: V,    length: "1/2", type_ref: RegistrationType5GS}
      - {name: MobileIdentity5GS,  iei: null, presence: M, format: LV-E, length: "6-n", type_ref: MobileIdentity5GS}

  - name: DeregistrationAcceptUEOriginating
    description: "Deregistration accept (UE originating) — TS 24.501 Table 8.2.13.1.1"
    epd: 0x7E
    message_type: 0x46
    direction: network_to_ue
    ies: []

  - name: DeregistrationRequestUETerminated
    description: "Deregistration request (UE terminated) — TS 24.501 Table 8.2.14.1.1"
    epd: 0x7E
    message_type: 0x47
    direction: network_to_ue
    ies:
      - {name: DeregistrationType, iei: null, presence: M, format: V,   length: "1",   type_ref: FiveGMMCause}
      - {name: Cause5GMM,          iei: "58", presence: O, format: TV,  length: "2",   type_ref: FiveGMMCause}
      - {name: T3346Value,         iei: "5F", presence: O, format: TLV, length: "3",   type_ref: GPRSTimer2}
      - {name: RejectedNSSAI,      iei: "6D", presence: O, format: TLV, length: "4-42", type_ref: RejectedNSSAI}
      - {name: CAGInformationList, iei: "75", presence: O, format: TLV-E, length: "3-n", type_ref: CAGInformationList}

  - name: DeregistrationAcceptUETerminated
    description: "Deregistration accept (UE terminated) — TS 24.501 Table 8.2.15.1.1"
    epd: 0x7E
    message_type: 0x48
    direction: ue_to_network
    ies: []

