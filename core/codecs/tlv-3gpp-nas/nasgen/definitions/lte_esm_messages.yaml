  # -----------------------------------------------------------------

  - name: ActivateDefaultEPSBearerContextRequest
    description: "Activate default EPS bearer context request — TS 24.301 Table 8.3.6.1"
    epd: 0x02
    message_type: 0xC1
    direction: network_to_ue
    ies:
      - {name: EPSQoS,              iei: null, presence: M, format: LV, length: "2-14", type_ref: EPSQualityOfService}
      - {name: AccessPointName,     iei: null, presence: M, format: LV, length: "3-102", type_ref: AccessPointName}
      - {name: PDNAddress,          iei: null, presence: M, format: LV, length: "6-14",  type_ref: PDNAddress}
      - {name: TransactionIdentifier, iei: "5D", presence: O, format: TLV, length: "3-4", type_ref: TransactionIdentifierIE}
      - {name: NegotiatedQoS,       iei: "30", presence: O, format: TLV, length: "14-24", type_ref: NegotiatedQoS}
      - {name: NegotiatedLLCSAPI,   iei: "32", presence: O, format: TV,  length: "2",    type_ref: NegotiatedLLCSAPI}
      - {name: RadioPriority,       iei: "8-", presence: O, format: TV,  length: "1",    type_ref: RadioPriority}
