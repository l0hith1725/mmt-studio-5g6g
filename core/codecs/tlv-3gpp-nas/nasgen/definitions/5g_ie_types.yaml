#
# 5G NAS IE type definitions — TS 24.501 clause 9.11.
#
# Shape conventions:
#   * Bit-field IE (≤8 bits total) — declare each sub-field with `bits` + `offset`.
#     Generator emits Decode(byte)/Encode() byte AND DecodeBytes/EncodeBytes.
#   * Structured IE — declare `bytes:` (and optional: true for tail fields).
#   * Byte-container IE — omit `fields`. Generator emits `Value []byte` plus
#     DecodeBytes/EncodeBytes that round-trip raw bytes. Use for IEs whose
#     internal structure we don't need to surface yet (QoS rules, EAP messages,
#     ePCO, etc.). min_length / max_length are still enforced.
#   * Runtime alias — set `go_type:` to reuse a hand-written pkg/runtime type.

ie_types:
  # ===================================================================
  # Bit-field / half-octet IEs (Type 1 V / TV)
  # ===================================================================

  - name: RegistrationType5GS
    description: "5GS registration type — TS 24.501 9.11.3.7"
    min_length: 0
    max_length: 0
    fields:
      - name: FollowOnRequestPending
        bits: 1
        offset: 3
        values:
          0: "no_follow_on_request_pending"
          1: "follow_on_request_pending"
      - name: RegistrationType
        bits: 3
        offset: 0
        values:
          1: "initial_registration"
          2: "mobility_registration_updating"
          3: "periodic_registration_updating"
          4: "emergency_registration"
          7: "reserved"

