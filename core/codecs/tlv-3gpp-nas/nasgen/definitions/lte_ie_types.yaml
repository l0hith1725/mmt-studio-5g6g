      - name: Value
        bytes: 1

  - name: APNAggregateMaximumBitRateExtended
    description: "APN aggregate maximum bit rate — extended — TS 24.301 9.9.4.2"
    min_length: 2
    max_length: 8

  - name: ConnectivityType
    description: "Connectivity type — TS 24.008 10.5.6.19"
