    direction: ue_to_network
    ies:
      - {name: Cause5GMM, iei: null, presence: M, format: V, length: "1", type_ref: FiveGMMCause}
      - {name: AuthenticationFailureParameter, iei: "30", presence: O, format: TLV, length: "16", type_ref: AuthenticationFailureParameter}

  - name: AuthenticationReject
    description: "Authentication reject — TS 24.501 Table 8.2.5.1.1"
    epd: 0x7E
    message_type: 0x58
    direction: network_to_ue
    ies:
      - {name: EAPMessage, iei: "78", presence: O, format: TLV-E, length: "7-1503", type_ref: EAPMessage}

