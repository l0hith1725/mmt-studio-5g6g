#
# LTE ESM messages — TS 24.301 clause 8.3.
# Protocol discriminator = 0x02. First octet = (EBI<<4 | 0x02); byte 1 = PTI;
# byte 2 = message type. The generator automatically adds EPSBearerIdentity +
# PTI fields to each ESM struct (EPD == 0x02), populated from the wire header.

messages:

  # -----------------------------------------------------------------
